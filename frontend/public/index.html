<!doctype html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#EA580C" />
        <meta
            name="description"
            content="KWIP La Campeona 880 AM · 103.9 FM — La que manda. Música regional mexicana en vivo desde Dallas, Oregon."
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <title>KWIP La Campeona · 880 AM · 103.9 FM — ¡La que manda!</title>
        <script>
            window.addEventListener(
                "error",
                function (e) {
                    if (
                        e.error instanceof DOMException &&
                        e.error.name === "DataCloneError" &&
                        e.message &&
                        e.message.includes("PerformanceServerTiming")
                    ) {
                        e.stopImmediatePropagation();
                        e.preventDefault();
                    }
                },
                true,
            );
        </script>
    </head>

        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
    </body>
